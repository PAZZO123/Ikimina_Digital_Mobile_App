name: ikimina_digital
description: A Digital Savings Group Management Mobile Application for Rwanda
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.6.0
  google_sign_in: ^6.2.1

  # Local Database
  drift: ^2.14.1
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.2
  path: ^1.8.3

  # Navigation
  go_router: ^13.0.1

  # UI & Charts
  fl_chart: ^0.66.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  google_fonts: ^6.1.0

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.11.1
  #open_file: ^3.3.2

  # Utilities
  intl: 0.20.2
  uuid: ^4.3.3
  equatable: ^2.0.5
  dartz: ^0.10.1
  connectivity_plus: ^5.0.2
  shared_preferences: ^2.2.2
  local_auth: ^2.1.8
  permission_handler: ^11.2.0
  image_picker: ^1.0.7
  flutter_local_notifications: ^17.2.4
  http: ^1.2.0
  dio: ^5.4.0
  dart_jsonwebtoken: ^2.8.0
  logger: ^2.1.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  pin_code_fields: ^8.0.1
  flutter_staggered_animations: ^1.1.1
  percent_indicator: ^4.2.3
  timeline_tile: ^2.0.0
  awesome_dialog: ^3.1.0
  fluttertoast: ^8.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  drift_dev: ^2.14.1
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true


